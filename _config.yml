title: "雁铃的Blog"
name: "雁铃"
description: "系统思维 · 财富自由 · AI 原生"
baseurl: ""
url: "https://yanlingyin25-ux.github.io"
repository: "yanlingyin25-ux/yanlingyin25-ux.github.io"

theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

minima:
  skin: classic
  social_links:
    - { platform: github,  user_url: "https://github.com/yanlingyin25-ux" }
    - { platform: telegram, user_url: "https://t.me/kevenyin_bot" }

author:
  name: "雁铃"
  email: "yanlingyin25@gmail.com"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
