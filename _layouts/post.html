---
layout: default
---

<article class="post-content">
    <header style="margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.08);">
        <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">{{ page.title }}</h1>
        <div class="post-meta">
            {{ page.date | date: "%Y年%m月%d日" }}
            {% if page.categories %} &middot; {{ page.categories | join: ", " }}{% endif %}
        </div>
    </header>
    
    {{ content }}
    
    <footer style="margin-top: 3rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.08);">
        <a href="{{ '/blog' | relative_url }}" class="btn">← 返回文章列表</a>
    </footer>
</article>
