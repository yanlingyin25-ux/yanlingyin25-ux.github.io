<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% seo %}
</head>
<body>
    <nav class="site-nav">
        <div class="nav-container">
            <a href="{{ '/' | relative_url }}" class="nav-brand">🚀 {{ site.title }}</a>
            <div class="nav-links">
                <a href="{{ '/' | relative_url }}">首页</a>
                <a href="{{ '/about' | relative_url }}">关于</a>
                <a href="{{ '/blog' | relative_url }}">文章</a>
                <a href="https://github.com/{{ site.social.github }}" target="_blank">GitHub</a>
            </div>
        </div>
    </nav>
    
    <main>
        {{ content }}
    </main>
    
    <footer class="site-footer">
        <p>Built with 🚀 First Principles · Inversion · Pattern Recognition</p>
        <p style="margin-top: 0.5rem; font-size: 0.75rem;">© {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
    </footer>
</body>
</html>
